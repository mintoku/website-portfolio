<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Jovia Low</title>
  <meta name="description" content="Get in touch with Jovia Low." />
  <link rel="icon" href="jovia_fav.ico">
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
</head>
<body>

<header class="site-header">
  <div class="nav-inner">
    <a class="brand" href="index.html" aria-label="Go to home">
      <span class="brand-name">Jovia Low</span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      <a href="index.html" class="nav-link">Home</a>
      <a href="index.html#about" class="nav-link">About</a>
      <a href="portfolio.html" class="nav-link">Portfolio</a>
      <a href="contact.html" class="nav-link nav-cta">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section id="name-wordle" aria-label="Contact title">
    <div class="wordle-title">
      <div class="tile"><div class="flip green">C</div></div>
      <div class="tile"><div class="flip green">O</div></div>
      <div class="tile"><div class="flip green">N</div></div>
      <div class="tile"><div class="flip green">T</div></div>
      <div class="tile"><div class="flip green">A</div></div>
      <div class="tile"><div class="flip green">C</div></div>
      <div class="tile"><div class="flip green">T</div></div>
    </div>
  </section>

  <section id="contact">
    <div class="contact-card panel-reveal">
      <h2>Reach me!</h2>
      <form id="contact-form">
        <div class="field">
          <label for="contact-name">Your Name</label>
          <input id="contact-name" type="text" name="name" required autocomplete="name" />
        </div>

        <div class="field">
          <label for="contact-email">Your Email</label>
          <input id="contact-email" type="email" name="email" required autocomplete="email" />
        </div>

        <div class="field">
          <label for="contact-message">Your message</label>
          <textarea id="contact-message" name="message" rows="5" required></textarea>
        </div>

        <button type="submit">Send</button>
        <p id="contact-status" aria-live="polite"></p>
      </form>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="footer-name">Jovia Low</span>
      <p class="footer-tagline">CS student at UC Santa Barbara</p>
    </div>
    <div class="footer-social">
      <a href="https://www.linkedin.com/in/jovia-low" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="https://github.com/mintoku" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="mailto:jovialow23@gmail.com">Email</a>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
